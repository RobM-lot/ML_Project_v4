          notebook_task:
            notebook_path: ../notebooks/02_register_best.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}
              RUN_ID: ""
              PROMOTE_IF_PASS: "True"

    evaluate_manual:
      name: "[${bundle.target}] evaluate_manual"
      max_concurrent_runs: 1
      tasks:
        - task_key: evaluate_model
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 300000
          retry_on_timeout: false
          timeout_seconds: 5400
          notebook_task:
            notebook_path: ../notebooks/03_evaluate_model.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}
              EVAL_MODEL_SOURCE: "champion"
