resources:
  jobs:
    daily_scoring_manual:
      name: "[${bundle.target}] daily_scoring_manual"
      max_concurrent_runs: 1
      tasks:
        - task_key: environment_contract_check
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 300000
          retry_on_timeout: false
          timeout_seconds: 1800
          notebook_task:
            notebook_path: ../notebooks/04_environment_check.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}

        - task_key: cdf_scoring
          depends_on:
            - task_key: environment_contract_check
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 600000
          retry_on_timeout: false
          timeout_seconds: 14400
          notebook_task:
            notebook_path: ../notebooks/01_cdf_stream.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}
              RUN_BOOTSTRAP: "True"
              RESET_CHECKPOINT: "False"
              STARTING_VERSION: "21"

        - task_key: prediction_audit_monitoring
          depends_on:
            - task_key: cdf_scoring
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 300000
          retry_on_timeout: false
          timeout_seconds: 3600
          notebook_task:
            notebook_path: ../notebooks/06_prediction_audit_monitoring.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}

    weekly_training_manual:
      name: "[${bundle.target}] weekly_training_manual"
      max_concurrent_runs: 1
      tasks:
        - task_key: environment_contract_check
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 300000
          retry_on_timeout: false
          timeout_seconds: 1800
          notebook_task:
            notebook_path: ../notebooks/04_environment_check.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}

        - task_key: build_training_set
          depends_on:
            - task_key: environment_contract_check
          existing_cluster_id: ${var.existing_cluster_id}
          max_retries: 1
          min_retry_interval_millis: 600000
          retry_on_timeout: false
          timeout_seconds: 10800
          notebook_task:
            notebook_path: ../notebooks/01_build_training_set.py
            base_parameters:
              ENV: ${var.runtime_env}
              SOURCE_CATALOG: ${var.source_catalog}
              SOURCE_SCHEMA: ${var.source_schema}
              SILVER_CATALOG: ${var.silver_catalog}
              SILVER_SCHEMA: ${var.silver_schema}
              GOLD_CATALOG: ${var.gold_catalog}
              GOLD_SCHEMA: ${var.gold_schema}

        - task_key: train_compare_models
